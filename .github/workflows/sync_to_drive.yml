name: Sync Codebase to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Solução 1: Roda o Repomix diretamente via npx (sem usar a action de terceiros)
      - name: Pack codebase with Repomix
        run: npx repomix --style xml --output repomix-output.xml
          
      # Solução 2: Usa uma Action alternativa e estável para o Google Drive
      - name: Upload to Google Drive
        uses: hoatruongdev09/upload-file-to-google-drive@v1.1
        with:
          file-path: 'repomix-output.xml'
          service-account-json: ${{ secrets.GDRIVE_CREDENTIALS }}
          upload-name: 'repomix-output.xml'
          upload-to-folder-id: ${{ secrets.GDRIVE_FOLDER_ID }}
          # Nota: O erro de digitação (dois 'r') é obrigatório pois está assim no código original da extensão
          overrwrite: 'true'
