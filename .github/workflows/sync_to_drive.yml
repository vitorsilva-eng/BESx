name: Sync Codebase to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Solução 1: Roda o Repomix diretamente via npx (sem usar a action de terceiros)
      - name: Pack codebase with Repomix
        run: npx repomix --style xml --output repomix-output.xml
          
      # Solução 2: Usa uma Action alternativa e estável para o Google Drive
      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: 'repomix-output.xml'
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          name: 'repomix-output.xml'
          overwrite: "true"
