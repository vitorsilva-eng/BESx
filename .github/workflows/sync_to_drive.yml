name: Sync Codebase to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Solução 1: Roda o Repomix diretamente via npx (sem usar a action de terceiros)
      - name: Pack codebase with Repomix
        run: npx repomix --style markdown --output repomix-output.md
          
      # Solução 2: Upload NATIVO com Python (Sem usar actions de terceiros, 100% à prova de falhas)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Google API Client
        run: pip install google-api-python-client google-auth
          
      - name: Upload to Google Drive (OAuth 2.0)
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          cat << 'EOF' > upload.py
          import os
          import sys
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from googleapiclient.errors import HttpError

          client_id = os.environ['GDRIVE_CLIENT_ID']
          client_secret = os.environ['GDRIVE_CLIENT_SECRET']
          refresh_token = os.environ['GDRIVE_REFRESH_TOKEN']
          folder_id = os.environ['GDRIVE_FOLDER_ID'].strip()

          # Recria o token de acesso (access_token) usando o refresh token
          creds = Credentials(
              None,
              refresh_token=refresh_token,
              token_uri="https://oauth2.googleapis.com/token",
              client_id=client_id,
              client_secret=client_secret
          )
          
          service = build('drive', 'v3', credentials=creds)
          file_name = 'repomix-output.md'

          try:
              # Verifica se a pasta existe e está acessível
              try:
                  service.files().get(fileId=folder_id, fields="id, name").execute()
              except HttpError as e:
                  print(f"\n[ERRO] A pasta com ID '{folder_id}' não foi encontrada ou seu usuário não tem acesso!")
                  print(f"Erro completo: {e}")
                  sys.exit(1)

              query = f"name='{file_name}' and '{folder_id}' in parents and trashed=false"
              results = service.files().list(q=query, spaces='drive', fields='files(id, name)').execute()
              files = results.get('files', [])

              media = MediaFileUpload(file_name, mimetype='text/markdown', resumable=True)

              if files:
                  file_id = files[0]['id']
                  service.files().update(fileId=file_id, media_body=media).execute()
                  print(f"Successfully updated {file_name} in Google Drive!")
              else:
                  file_metadata = {'name': file_name, 'parents': [folder_id]}
                  service.files().create(body=file_metadata, media_body=media, fields='id').execute()
                  print(f"Successfully uploaded {file_name} to Google Drive!")
                  
          except Exception as ex:
              print(f"Erro fatal durante upload: {ex}")
              sys.exit(1)
          EOF
          python upload.py
