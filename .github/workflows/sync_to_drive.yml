name: Sync Codebase to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Pack codebase with Repomix
        uses: yamadashy/repomix-action@v1
        with:
          style: xml
          output: repomix-output.xml
          
      - name: Upload to Google Drive
        uses: Jumbo810/upload-github-actions-artifacts-to-google-drive@v2.3.3
        with:
          target: repomix-output.xml
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
          replace_mode: update_in_place
